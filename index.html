<!DOCTYPE html>
<html lang="uk" id="top">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Чолак Вікторія · Performance Marketer</title>
<meta name="description" content="Таргетована реклама FB & IG. Запуск і масштабування рекламних кампаній. Прозоро, з фокусом на окупність кожної гривні."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
 
<!-- NAV -->
<div class="nav-bar">
  <nav class="nav">
    <span class="brand"><span class="dot"></span>Cholak · V</span>
    <div class="nav-links" id="nav-links">
      <a href="#problems" id="nav-problems"></a>
      <a href="#services" id="nav-services"></a>
      <a href="#cases" id="nav-cases"></a>
      <a href="#about" id="nav-about"></a>
    </div>
    <span class="lang">
      <button id="btn-uk" class="on" onclick="setLang('uk')">UA</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </span>
    <a href="#form" class="nav-cta" id="nav-cta"></a>
    <button class="burger-btn" id="burger-btn" aria-label="Menu" onclick="toggleMenu()">
      <div class="burger-line"></div>
      <div class="burger-line"></div>
      <div class="burger-line"></div>
    </button>
  </nav>
</div>
 
<!-- HERO -->
<section class="hero">
  <div class="hero-glow"></div>
  <div class="container">
    <div class="reveal">
      <div class="font-mono" style="font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;">
        <span style="color:var(--accent)">● </span><span id="hero-eyebrow"></span>
      </div>
    </div>
    <div class="hero-grid">
      <div>
        <div class="reveal">
          <h1 class="h-display" id="hero-h1"></h1>
        </div>
        <div class="reveal" style="transition-delay:.15s">
          <p class="lede" style="margin-top:24px" id="hero-sub"></p>
        </div>
        <div class="reveal" style="transition-delay:.25s">
          <div class="hero-cta-row">
            <a href="#form" class="btn btn-primary" id="hero-cta-primary"><span class="arr">→</span></a>
            <a href="#cases" class="btn btn-ghost" id="hero-cta-secondary"><span class="arr">→</span></a>
          </div>
        </div>
        <div class="reveal" style="transition-delay:.35s">
          <div class="hero-tags" id="hero-tags"></div>
        </div>
      </div>
      <div class="reveal" style="transition-delay:.2s">
        <div class="hero-photo-wrap">
          <img src="IMG/Hero.jpg" alt="Чолак Вікторія" onerror="this.style.display='none'"/>
          <div class="hero-mini-card">
            <span style="color:var(--muted)">AVG ROAS</span>
            <span class="roas">×3.4</span>
          </div>
          <div class="hero-photo-meta">
            <div>
              <p class="hero-photo-name" id="hero-photo-name">Чолак Вікторія</p>
              <span>Performance Marketer</span>
            </div>
            <span>Odesa / 2026</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
 
<!-- LIVE -->
<section>
  <div class="container">
    <div class="reveal">
      <div class="live-card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
          <span class="live-pulse"><span class="dot"></span><span id="live-kicker"></span></span>
          <span class="font-mono" style="font-size:11px;letter-spacing:.1em;color:var(--muted)" id="live-pulse"></span>
        </div>
        <h2 class="h-section" style="margin-top:22px;max-width:760px" id="live-title"></h2>
        <p class="lede" style="margin-top:14px" id="live-sub"></p>
        <div class="live-grid" id="live-grid"></div>
      </div>
    </div>
  </div>
</section>
 
<!-- PROBLEMS -->
<section id="problems">
  <div class="container">
    <div class="reveal"><div class="kicker" id="problems-kicker"></div></div>
    <div class="reveal" style="transition-delay:.08s"><h2 class="h-section" style="max-width:800px" id="problems-title"></h2></div>
    <div style="margin-top:40px" class="problems" id="problems-grid"></div>
  </div>
</section>
 
<!-- SERVICES -->
<section id="services">
  <div class="container">
    <div class="reveal"><div class="kicker" id="services-kicker"></div></div>
    <div class="reveal" style="transition-delay:.08s"><h2 class="h-section" id="services-title"></h2></div>
    <div style="margin-top:40px" class="services" id="services-grid"></div>
  </div>
</section>
 
<!-- ROI CALCULATOR -->
<section>
  <div class="container">
    <div class="reveal"><div class="kicker" id="roi-kicker"></div></div>
    <div class="reveal" style="transition-delay:.08s"><h2 class="h-section" style="max-width:880px" id="roi-title"></h2></div>
    <div class="reveal" style="transition-delay:.15s"><p class="lede" style="margin-top:14px" id="roi-sub"></p></div>
    <div class="reveal" style="transition-delay:.2s;margin-top:32px">
      <div class="roi-card">
        <div class="roi-grid">
          <div>
            <div class="roi-input"><label id="roi-lbl-budget"></label><input type="number" id="roi-budget" value="50000" oninput="calcRoi()"/></div>
            <div class="roi-input"><label id="roi-lbl-cpl"></label><input type="number" id="roi-cpl" value="220" oninput="calcRoi()"/></div>
            <div class="roi-input"><label id="roi-lbl-conv"></label><input type="number" id="roi-conv" value="15" oninput="calcRoi()"/></div>
            <div class="roi-input"><label id="roi-lbl-check"></label><input type="number" id="roi-check" value="2500" oninput="calcRoi()"/></div>
          </div>
          <div>
            <div class="roi-results-grid">
              <div class="roi-result">
                <div class="roi-result-title" id="roi-now-lbl"></div>
                <div style="margin-top:10px">
                  <div class="roi-row"><span id="roi-leads-lbl"></span><span class="v" id="roi-now-leads"></span></div>
                  <div class="roi-row"><span id="roi-rev-lbl"></span><span class="v" id="roi-now-rev"></span></div>
                  <div class="roi-row"><span id="roi-roas-lbl"></span><span class="v" id="roi-now-roas"></span></div>
                </div>
              </div>
              <div class="roi-result">
                <div class="roi-result-title up" id="roi-with-lbl"></div>
                <div style="margin-top:10px">
                  <div class="roi-row"><span id="roi-leads-lbl2"></span><span class="v accent" id="roi-with-leads"></span></div>
                  <div class="roi-row"><span id="roi-rev-lbl2"></span><span class="v accent" id="roi-with-rev"></span></div>
                  <div class="roi-row"><span id="roi-roas-lbl2"></span><span class="v accent" id="roi-with-roas"></span></div>
                </div>
              </div>
            </div>
            <div class="roi-diff">
              <div class="roi-diff-label" id="roi-diff-label"></div>
              <div class="roi-diff-value" id="roi-diff-value"></div>
            </div>
            <a href="#form" class="btn btn-primary" style="margin-top:18px;width:100%;justify-content:center" id="roi-cta"><span class="arr">→</span></a>
            <p style="margin-top:14px;font-size:12px;color:var(--muted);line-height:1.55" id="roi-note"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
 
<!-- CASES -->
<section id="cases">
  <div class="container">
    <div class="reveal"><div class="kicker" id="cases-kicker"></div></div>
    <div class="reveal" style="transition-delay:.08s">
      <div style="display:flex;justify-content:space-between;align-items:end;flex-wrap:wrap;gap:20px">
        <h2 class="h-section" id="cases-title"></h2>
        <p class="lede" style="max-width:360px" id="cases-sub"></p>
      </div>
    </div>
    <div style="margin-top:40px" class="cases" id="cases-grid"></div>
  </div>
</section>
 
<!-- PROCESS -->
<section>
  <div class="container">
    <div class="reveal"><div class="kicker" id="process-kicker"></div></div>
    <div class="reveal" style="transition-delay:.08s"><h2 class="h-section" id="process-title"></h2></div>
    <div style="margin-top:40px" class="process" id="process-grid"></div>
  </div>
</section>
 
<!-- ABOUT -->
<section id="about">
  <div class="container">
    <div class="reveal"><div class="kicker" id="about-kicker"></div></div>
    <div class="about-grid" style="margin-top:24px">
      <div class="reveal">
        <div class="about-photo">
          <img src="IMG/About.JPG" alt="Чолак Вікторія" onerror="this.style.display='none'"/>
        </div>
        <h3 class="about-name" id="about-name"></h3>
        <div class="about-role" id="about-role"></div>
      </div>
      <div class="reveal" style="transition-delay:.15s">
        <h2 class="h-section" id="about-title"></h2>
        <p class="lede" style="margin-top:22px" id="about-body"></p>
        <div class="about-stats" id="about-stats"></div>
      </div>
    </div>
  </div>
</section>
 
<!-- FAQ -->
<section>
  <div class="container">
    <div class="reveal"><div class="kicker" id="faq-kicker"></div></div>
    <div class="reveal" style="transition-delay:.08s"><h2 class="h-section" id="faq-title"></h2></div>
    <div style="margin-top:40px" class="faq-list" id="faq-list"></div>
  </div>
</section>
 
<!-- FORM -->
<section id="form">
  <div class="container">
    <div class="reveal"><div class="kicker" id="form-kicker"></div></div>
    <div class="reveal" style="transition-delay:.08s"><h2 class="h-section" style="max-width:820px" id="form-title"></h2></div>
    <div class="reveal" style="transition-delay:.15s"><p class="lede" style="margin-top:14px" id="form-sub"></p></div>
    <div class="reveal" style="transition-delay:.2s">
      <div class="form-card" style="margin-top:32px">
        <div class="form-grid">
          <div class="field">
            <label id="form-lbl-name"></label>
            <input type="text" id="form-name" required/>
          </div>
          <div class="field">
            <label id="form-lbl-contact"></label>
            <input type="text" id="form-contact" required/>
          </div>
          <div class="field">
            <label id="form-lbl-budget"></label>
            <select id="form-budget"></select>
          </div>
          <div class="field">
            <label id="form-lbl-niche"></label>
            <input type="text" id="form-niche" required/>
          </div>
          <div class="full" style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
            <button type="button" class="btn btn-primary" id="form-submit" onclick="submitForm()">
              <span id="form-submit-text"></span><span class="arr">→</span>
            </button>
            <span class="form-msg" id="form-msg" style="display:none"></span>
          </div>
          <p class="form-privacy full" id="form-privacy"></p>
        </div>
      </div>
    </div>
  </div>
</section>
 
<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <div class="footer-row">
      <div>
        <div class="font-mono" style="font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)">
          ● <span id="footer-tagline"></span>
        </div>
        <div class="footer-links">
          <a class="footer-link" href="https://t.me/chollak" target="_blank" rel="noopener">↗ <span id="footer-tg"></span></a>
          <a class="footer-link" href="https://instagram.com/vviktoriiaaa.a" target="_blank" rel="noopener">↗ <span id="footer-ig"></span></a>
          <a class="footer-link" href="mailto:hello@cholak.victoria">↗ <span id="footer-mail"></span></a>
        </div>
      </div>
      <a href="#top" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;"
         class="font-mono" style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);border-bottom:1px solid var(--line-2);padding-bottom:4px">
        ↑ Back to top
      </a>
    </div>
  </div>
  <h2 class="footer-brand reveal">VIKTORIA</h2>
  <div class="container">
    <div class="footer-meta">
      <span id="footer-copy"></span>
      <span>Made in Odesa · 2026</span>
    </div>
  </div>
</footer>
<script src="script.js"></script>
</body>
</html>
